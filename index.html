<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/pandasuite-bridge/lib/pandasuite-bridge.min.js"></script>
<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>
body{margin:0;background:black;color:white;font-family:Arial;text-align:center}

video{
width:100vw;
height:100vh;
object-fit:cover
}

#txt{
position:fixed;
top:20px;
width:100%;
font-size:22px
}

#box{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70%;
height:25%;
border:4px solid #00FF88;
border-radius:12px
}
</style>
</head>

<body>

<div id="txt">Place le code-barres dans le cadre</div>
<div id="box"></div>
<video id="video"></video>

<script>

const txt=document.getElementById("txt");
const video=document.getElementById("video");

const reader = new ZXingBrowser.BrowserMultiFormatReader();

async function start(){

const devices = await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();

/* choisir caméra arrière */
let back = devices.find(d => d.label.toLowerCase().includes("back"));

if(!back){
back = devices[0];
}

reader.decodeFromVideoDevice(back.deviceId, video, (result, err) => {

if(result){

const code=result.getText();

txt.innerHTML="✔ Code détecté : "+code;

if(navigator.vibrate){
navigator.vibrate(200);
}

/* envoyer à PandaSuite */

if(window.PandaBridge){
PandaBridge.send({
ean:code
});
}

reader.reset();

}

});

}

start();

</script>

</body>
</html>
