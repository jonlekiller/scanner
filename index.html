<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/pandasuite-bridge/lib/pandasuite-bridge.min.js"></script>
<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.js"></script>

<style>
body{margin:0;background:black}
#scanner{width:100vw;height:100vh}
#txt{position:fixed;top:20px;width:100%;color:white;text-align:center}
</style>
</head>

<body>

<div id="txt">Scanner le code-barres</div>
<div id="scanner"></div>

<script>

Quagga.init({

inputStream:{
type:"LiveStream",
target:document.querySelector('#scanner'),
constraints:{
facingMode:"environment"
}
},

decoder:{
readers:[
"ean_reader",
"ean_8_reader",
"code_128_reader"
]
}

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});

Quagga.onDetected(function(result){

const code=result.codeResult.code;

if(window.PandaBridge){

PandaBridge.send("scan",{
ean:code
});

}

Quagga.stop();

});

</script>

</body>
</html>
