<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/pandasuite-bridge/lib/pandasuite-bridge.min.js"></script>
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{margin:0;background:black;color:white;text-align:center;font-family:Arial}

video{
width:100vw;
height:100vh;
object-fit:cover
}

#txt{
position:fixed;
top:20px;
width:100%;
font-size:20px
}

#box{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70%;
height:25%;
border:4px solid #00FF88;
border-radius:12px
}
</style>
</head>

<body>

<div id="txt">Scanner le code-barres</div>
<div id="box"></div>
<video id="video"></video>

<script>

const txt=document.getElementById("txt");
const video=document.getElementById("video");

const codeReader = new ZXing.BrowserMultiFormatReader();

async function start(){

const devices = await codeReader.listVideoInputDevices();

/* choisir caméra arrière */
let backCamera = devices.find(d => d.label.toLowerCase().includes("back"));

if(!backCamera){
backCamera = devices[0];
}

codeReader.decodeFromVideoDevice(backCamera.deviceId, video, (result, err) => {

if(result){

const code=result.text;

txt.innerHTML="✔ Code détecté : "+code;

/* vibration */
if(navigator.vibrate){
navigator.vibrate(200);
}

/* envoyer à PandaSuite */

if(window.PandaBridge){
PandaBridge.send({
ean:code
});
}

codeReader.reset();

}

});

}

start();

</script>

</body>
</html>
