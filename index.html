<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/pandasuite-bridge/lib/pandasuite-bridge.min.js"></script>
<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.js"></script>

<style>
body{margin:0;background:black;color:white;font-family:Arial}
#scanner{width:100vw;height:100vh}
#txt{position:fixed;top:20px;width:100%;text-align:center;font-size:18px}
</style>
</head>

<body>

<div id="txt">Place le code-barres devant la caméra</div>
<div id="scanner"></div>

<script>

const txt=document.getElementById("txt");

Quagga.init({

inputStream:{
type:"LiveStream",
target:document.querySelector('#scanner'),
constraints:{
facingMode:"environment"
}
},

decoder:{
readers:[
"ean_reader",
"ean_8_reader",
"code_128_reader"
]
}

},function(err){

if(err){
txt.innerHTML="Erreur caméra";
return;
}

Quagga.start();

});

Quagga.onDetected(function(result){

const code=result.codeResult.code;

txt.innerHTML="Code détecté : "+code;

/* envoyer à PandaSuite */

if(window.PandaBridge){
PandaBridge.send({
ean:code
});
}

Quagga.stop();

});

</script>

</body>
</html>
