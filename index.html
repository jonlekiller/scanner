<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner EAN</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}
#video{
  width:100vw;
  height:100vh;
  object-fit:cover;
}
#overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}
#box{
  width:70%;
  height:25%;
  border:4px solid #00FF88;
  border-radius:12px;
}
#txt{
  position:fixed;
  bottom:40px;
  width:100%;
  font-size:18px;
}
#start{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 24px;
  font-size:18px;
  background:#00FF88;
  color:black;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<video id="video" playsinline></video>

<div id="overlay">
  <div id="box"></div>
</div>

<button id="start">Activer la caméra</button>
<div id="txt">Appuyez pour scanner</div>

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.js"></script>

<script>
const startBtn = document.getElementById("start");
const txt = document.getElementById("txt");

startBtn.onclick = function(){

  startBtn.style.display="none";
  txt.innerHTML="Scanner en cours...";

  Quagga.init({
    inputStream:{
      type:"LiveStream",
      target:document.querySelector('#video'),
      constraints:{
        facingMode:"environment"
      }
    },
    decoder:{
      readers:["ean_reader","ean_8_reader"]
    }
  },function(err){
    if(err){
      txt.innerHTML="Caméra non supportée";
      return;
    }
    Quagga.start();
  });

  Quagga.onDetected(function(result){

    const code = result.codeResult.code;

    txt.innerHTML="Code détecté : "+code;

    // Envoi direct à PandaSuite
    if(window.PandaBridge){
      PandaBridge.emit("scan",{ean:code});
    }

    Quagga.stop();
  });
};
</script>

</body>
</html>
