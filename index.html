<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner EAN</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}
#video{
  width:100vw;
  height:100vh;
  object-fit:cover;
}
#overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}
#box{
  width:70%;
  height:25%;
  border:4px solid #00FF88;
  border-radius:12px;
}
#txt{
  position:fixed;
  bottom:90px;
  width:100%;
  font-size:18px;
}
#start{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 24px;
  font-size:18px;
  background:#00FF88;
  color:black;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<video id="video" playsinline muted></video>

<div id="overlay">
  <div id="box"></div>
</div>

<div id="txt">Appuyez pour activer la caméra</div>
<button id="start">Scanner</button>

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.js"></script>

<script>
const startBtn = document.getElementById("start");
const txt = document.getElementById("txt");
const video = document.getElementById("video");

let started = false;

startBtn.onclick = async function(){

  if(started) return;
  started = true;

  startBtn.style.display="none";
  txt.innerHTML="Autorisation caméra...";

  try{
    // 🔹 on récupère NOUS le flux caméra (corrige écran noir)
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ ideal:"environment" } },
      audio:false
    });

    video.srcObject = stream;
    video.setAttribute("playsinline", true);
    await video.play();

  }catch(e){
    txt.innerHTML="Caméra refusée";
    return;
  }

  txt.innerHTML="Scanner en cours...";

  // 🔹 Quagga lit la vidéo déjà active
  Quagga.init({
    inputStream:{
      type:"LiveStream",
      target:video,
      constraints:{
        facingMode:"environment"
      }
    },
    decoder:{
      readers:["ean_reader","ean_8_reader"]
    },
    locate:true
  },function(err){
    if(err){
      txt.innerHTML="Erreur initialisation scanner";
      return;
    }
    Quagga.start();
  });

  Quagga.onDetected(function(result){

    const code = result.codeResult.code;
    txt.innerHTML="Code détecté : "+code;

    // 🔹 envoi au composant PandaSuite
    if(window.PandaBridge){
      PandaBridge.emit("scan",{ean:code});
    }

    Quagga.stop();
  });
};
</script>

</body>
</html>
